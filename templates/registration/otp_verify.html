{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác thực OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .otp-card { width: 450px; background: #fff; border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
        .otp-input { letter-spacing: 15px; font-size: 32px; font-weight: 800; text-align: center; border-radius: 16px; height: 70px; border: 2px solid #e2e8f0; }
        .otp-input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .timer { font-weight: 700; color: #dc2626; background: #fef2f2; padding: 5px 15px; border-radius: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="otp-card">
    <div class="mb-4">
        <div class="display-5 text-primary mb-2">🔒</div>
        <h3 class="fw-bold">Xác thực đăng nhập</h3>
        <p class="text-muted">Mã OTP đã được gửi đến NetChat của nhân viên: <br><strong class="text-dark">{{ employee_code }}</strong></p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 small">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="otp_code" class="form-control otp-input" maxlength="6" placeholder="000000" autofocus required>
            <div class="mt-3 small text-muted">Mã hết hạn sau: <span id="countdown" class="timer">10:00</span></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold py-3 mb-3" style="border-radius: 14px;">
            XÁC NHẬN ĐĂNG NHẬP
        </button>

        <a href="{% url 'login' %}" class="text-decoration-none small fw-bold text-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại nhập mã nhân viên
        </a>
    </form>
</div>

<script>
    // Logic đếm ngược 10 phút
    let time = 600; // 10 phút = 600 giây
    const display = document.getElementById('countdown');

    const timer = setInterval(function () {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        display.innerHTML = minutes + ":" + seconds;
        
        if (--time < 0) {
            clearInterval(timer);
            display.innerHTML = "HẾT HẠN";
            alert("Mã OTP đã hết hạn, vui lòng yêu cầu mã mới.");
            window.location.href = "{% url 'login' %}";
        }
    }, 1000);
</script>

</body>
</html>
