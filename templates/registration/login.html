{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #eef1f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .login-wrapper {
            width: 920px;
            min-height: 560px;
            background: #fff;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 22px 60px rgba(15, 23, 42, 0.18);
            display: grid;
            grid-template-columns: 1.05fr 1fr;
        }

        .login-left {
            position: relative;
            background:
                linear-gradient(rgba(15,23,42,0.45), rgba(15,23,42,0.65)),
                url("/static/image/login-bg.webp");
            background-size: cover;
            background-position: center;

            color: #fff;
            padding: 50px 42px;

            display: flex;
            flex-direction: column;
            justify-content: flex-start;   /* 🔥 từ center → top */
        }

        .login-left h1 {
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .login-left p {
            letter-spacing: 2px;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 24px;
        }

        .login-brand-bottom {
            position: absolute;
            bottom: 34px;
            left: 42px;
            font-size: 14px;
            opacity: 0.9;
        }

        .login-right {
            padding: 64px 58px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #111827;
        }

        .login-subtitle {
            color: #64748b;
            margin-bottom: 34px;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .login-input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 16px;
        }

        .login-input {
            width: 100%;
            border: none;
            outline: none;
            height: 48px;
            border-radius: 999px;
            background: #f4f6f8;
            padding: 0 18px 0 46px;
            box-shadow: inset 0 0 0 1px #e5e7eb;
        }

        .login-input:focus {
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.14), inset 0 0 0 1px #2563eb;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: 0;
            background: transparent;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #64748b;
            margin: 4px 0 24px;
        }

        .login-btn {
            height: 46px;
            border: 0;
            border-radius: 999px;
            background: #1f2937;
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 0 28px;
            min-width: 150px;
            align-self: flex-end;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #111827;
            transform: translateY(-1px);
        }

        .login-error {
            border-radius: 14px;
            padding: 12px 14px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 14px;
            margin-bottom: 18px;
        }

        @media (max-width: 900px) {
            .login-wrapper {
                width: 94%;
                grid-template-columns: 1fr;
            }

            .login-left {
                display: none;
            }

            .login-right {
                padding: 42px 28px;
            }
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-left">
        <h1>Bếp ăn khu vực 2</h1>
        <p>QUẢN LÝ THỰC ĐƠN • SUẤT ĂN • CHI PHÍ</p>

        <div class="login-brand-bottom">
            <strong>@CĐS TTKT KV2 - VT NET</strong><br>
            Hệ thống quản lí bếp ăn
        </div>
    </div>

    <div class="login-right">
        <div class="login-title">Đăng nhập</div>
        <div class="login-subtitle">Vui lòng nhập tài khoản để tiếp tục.</div>

        {% if form.errors %}
            <div class="login-error">
                Tên đăng nhập hoặc mật khẩu không đúng.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="login-input-group">
                <i class="bi bi-person"></i>
                <input
                    type="text"
                    name="username"
                    class="login-input"
                    placeholder="Mã nhân viên / Tên đăng nhập"
                    required
                    autofocus
                >
            </div>

            <div class="login-input-group">
                <i class="bi bi-lock"></i>
                <input
                    type="password"
                    name="password"
                    id="passwordInput"
                    class="login-input"
                    placeholder="Mật khẩu"
                    required
                >
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>

            <div class="login-options">
                <label>
                    <input type="checkbox"> Ghi nhớ đăng nhập
                </label>
            </div>

            <button type="submit" class="login-btn">
                LOGIN <i class="bi bi-arrow-right ms-2"></i>
            </button>
            <div style="text-align: right; margin-top: 12px;">
                <a href="{% url 'set_initial_password' %}"
                style="font-size: 13px; color: #2563eb; font-weight: 600; text-decoration: none;">
                    Đặt mật khẩu lần đầu
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');

    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>

</body>
</html>
