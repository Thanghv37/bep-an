{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt mật khẩu lần đầu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="min-height:100vh;background:#eef1f5;display:flex;align-items:center;justify-content:center;">

<div class="card shadow border-0" style="width:420px;border-radius:24px;">
    <div class="card-body p-4">
        <h3 class="fw-bold mb-2">Đặt mật khẩu lần đầu</h3>
        <p class="text-muted mb-4">Nhập mã nhân viên và mật khẩu mới.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Mã nhân viên</label>
                <input type="text" name="employee_code" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" name="password1" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nhập lại mật khẩu</label>
                <input type="password" name="password2" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Đặt mật khẩu
            </button>
        </form>

        <div class="mt-3 text-center">
            <a href="{% url 'login' %}">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

</body>
</html>
