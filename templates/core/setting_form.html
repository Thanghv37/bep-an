<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="dashboard-card">
            <div class="section-title">{{ page_title }}</div>
            <div class="section-subtitle">
                Thay đổi đơn giá suất ăn đang dùng để tính Thu trên dashboard và báo cáo.
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label fw-semibold">Giá suất ăn</label>
                    {{ form.meal_price }}
                    {% if form.meal_price.errors %}
                        <div class="text-danger small mt-1">{{ form.meal_price.errors }}</div>
                    {% endif %}
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}</title>
</head>
<body>

</body>
</html>
